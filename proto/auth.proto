syntax = "proto3";

package auth;

option go_package = "./";

service AuthService {
  rpc Register(RegisterRequest) returns (MessageResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc RefreshToken(RefreshRequest) returns (RefreshResponse);
  rpc Logout(LogoutRequest) returns (MessageResponse);

  rpc MyProfile(MyProfileRequest) returns (UserResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (MessageResponse);
}

message RegisterRequest {
  string name = 1;
  string surname = 2;
  string phone = 3;
  string email = 4;
  string password = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
  string access_token = 2;
}

message MyProfileRequest {
  string user_id = 1;
}

message UpdateProfileRequest {
  string user_id = 1;
  string name = 2;
  string surname = 3;
  string phone = 4;
  string email = 5;
  string password = 6;
}

message AuthResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshResponse {
  string access_token = 1;
}

message UserResponse {
  string id = 1;
  string name = 2;
  string surname = 3;
  string phone = 4;
  string email = 5;
  bool is_active = 6;
}

message MessageResponse {
  string message = 1;
}